groups:
  - name: kor-assetforge
    interval: 30s
    rules:
      - alert: HighErrorRate
        expr: |
          (sum(rate(http_requests_total{status=~"5.."}[5m])) by (job))
          /
          (sum(rate(http_requests_total[5m])) by (job))
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for job {{ $labels.job }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is above 1s"

      - alert: DatabaseErrors
        expr: rate(db_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database errors detected"
          description: "Database error rate is {{ $value }} errors/sec"

      - alert: DatabaseConnectionPoolExhausted
        expr: db_pool_in_use_connections / clamp_min(db_pool_max_open_connections, 1) > 0.9
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool is near exhaustion"
          description: "More than 90% of configured database connections are in use."

      - alert: CacheIneffective
        expr: |
          (sum(rate(cache_misses_total[5m])) by (cache_type))
          /
          (sum(rate(cache_hits_total[5m])) by (cache_type) + sum(rate(cache_misses_total[5m])) by (cache_type))
          > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Cache miss rate is high"
          description: "Cache miss rate for {{ $labels.cache_type }} is above 50%"

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / 1024 / 1024 > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB"

      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}"
